version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      - java -version
  build:
    commands:
      - cd backend && chmod +x gradlew && ./gradlew bootJar -x test
      - echo "=== JAR 파일 찾기 ==="
      - find . -name "*.jar" -type f
  post_build:
    commands:
      - cd $CODEBUILD_SRC_DIR
      - echo "=== libs 폴더 내용 ==="
      - ls -la backend/build/libs/
      - mkdir -p deploy-backend
      - cp backend/build/libs/*.jar deploy-backend/note-app.jar
      - cp backend/Procfile deploy-backend/
      - '[ -d backend/.ebextensions ] && cp -r backend/.ebextensions deploy-backend/ || true'
      - ls -la deploy-backend/

artifacts:
  files:
    - '**/*'
  base-directory: deploy-backend
  discard-paths: no